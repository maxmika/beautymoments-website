<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.07"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="45%" r="75%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <linearGradient id="base" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#2c2420"/>
      <stop offset="0.55" stop-color="#272019"/>
      <stop offset="1" stop-color="#1d1713"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1000" fill="url(#base)"/>

  <g filter="url(#soft)">
    <ellipse cx="180" cy="170" rx="300" ry="240" fill="#e8a763" opacity="0.36"/>
    <ellipse cx="660" cy="330" rx="260" ry="300" fill="#c2622e" opacity="0.34"/>
    <ellipse cx="420" cy="640" rx="340" ry="280" fill="#f3e9e0" opacity="0.18"/>
    <ellipse cx="130" cy="840" rx="260" ry="220" fill="#8f3f1d" opacity="0.45"/>
    <ellipse cx="700" cy="900" rx="240" ry="200" fill="#d98a4f" opacity="0.28"/>
    <circle cx="560" cy="120" r="70" fill="#f3e9e0" opacity="0.28"/>
    <circle cx="260" cy="470" r="55" fill="#d98a4f" opacity="0.35"/>
  </g>

  <rect width="800" height="1000" fill="url(#vignette)"/>
  <rect width="800" height="1000" fill="#272019" opacity="0" filter="url(#grain)"/>
</svg>
